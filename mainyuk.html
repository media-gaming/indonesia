<html lang="id">
<head>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gameplay Benihtoto</title>
<link rel="apple-touch-icon" href="https://www.image2url.com/r2/default/images/1777487535480-838e3e40-b748-43a6-9e85-1ff7db057f2e.jpeg">

<style>
/* 🔥 BADGE TOP HIJAU SIMPLE */
.badge-top {
    position:absolute;
    top:0px;
    left:0px;
    display:flex;
    align-items:center;
    gap:8px;
    border-radius:25px;
    z-index:5;
}

.badge-top img {
    width:40px;
    height:40px;
    object-fit:cover;
}

.badge-top span {
    font-size:15px;
    font-weight:bold;
    color:#00ff4c;
}
body {
    font-family:Arial;
    background-color:#000; /* fallback */
    color:white;
    overflow-x:hidden;
}

/* 🔥 BACKGROUND PC */
body::before {
    content:"";
    position:fixed;
    inset:0;
    background:url('https://www.image2url.com/r2/default/images/1777565703123-c965aa1e-607a-4531-946d-51699e454041.png') no-repeat center center;
    background-size:cover;
    background-position:center;
    z-index:-2;
}

/* 🔥 BACKGROUND MOBILE */
@media (max-width: 768px){
    body::before {
        background:url('https://www.image2url.com/r2/default/images/1777565729466-17d5fc5c-7078-4af4-8fdd-0b13bc949ff9.png') no-repeat center top;
        background-size:cover;
        background-position:center top;
    }
}

/* COVER */
.cover {
    position:relative;
    width:100%;
    aspect-ratio:16/9; /* 🔥 jadi 16:9 */
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    overflow:hidden;
}

/* EFEK GELAP */
.cover::after {
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(
        to bottom,
        rgba(0,0,0,0.1) 0%,   /* atas terang */
        rgba(0,0,0,0.3) 40%,
        rgba(0,0,0,0.85) 100% /* bawah gelap */
    );
}

/* PROFILE */
.profile {
    position:absolute;
    left:20px;
    bottom:1px;
    display:flex;
    align-items:center;
    gap:12px;
    z-index:5;
    flex-wrap:nowrap; /* 🔥 WAJIB */
}

.profile img {
    width:80px;
    height:80px;
    border-radius:50%;
    border:3px solid #00ffff;
    box-shadow:0 0 15px #00ffff;
}

.profile h2 {
    margin-left:10px;
    text-shadow:0 0 10px #00ffff;
}

.space { height:100px; }

/* BANNER LAMA */
.banner {
    margin:15px;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 0 25px #00ffff;
    animation:pulse 2s infinite;
    height:60px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.banner img {
    height:60px;
    width:auto;
}

/* 🔥 BANNER BARU (PC ONLY) */
.banner-wrap {
    display:none;
}

@media (min-width: 900px) {

    .banner {
        display:none;
    }

    .banner-wrap {
        display:flex;
        justify-content:space-between;
        align-items:center;
        max-width:1200px;
        margin:25px auto;
        padding:0 40px;
    }

    .banner-left,
    .banner-right {
        width:512px;
        height:60px;
        border-radius:12px;
        overflow:hidden;
        box-shadow:0 0 25px #00ffff;
        animation:pulse 2s infinite;
    }

    .banner-left img,
    .banner-right img {
        width:100%;
        height:100%;
        object-fit:cover;
        display:block;
    }
}

/* FIX HP */
@media (max-width:600px) {
    .banner {
        height:auto;
    }
    .banner img {
        width:100%;
        height:auto;
    }
}

@keyframes pulse {
    0% {box-shadow:0 0 10px #00ffff;}
    50% {box-shadow:0 0 30px #00ffff;}
    100% {box-shadow:0 0 10px #00ffff;}
}

/* CARD */
.card {
    background: linear-gradient(145deg,#0f172a,#1e293b);
    border-radius:15px;
    margin:20px 15px;
    overflow:hidden;
    position:relative;
    box-shadow:0 0 15px rgba(0,255,255,0.2);
    transition:0.3s;
}
/* 🔥 NEON GESER (SHINE EFFECT) */
.card::before {
    content:"";
    position:absolute;
    top:0;
    left:-120%;
    width:80%;
    height:100%;
    background:linear-gradient(
        120deg,
        transparent,
        rgba(0,255,255,0.5),
        transparent
    );
    transform:skewX(-20deg);
    transition:0.7s;
    pointer-events:none;
}

/* 🔥 AKTIF SAAT HOVER (PC) */
.card:hover::before {
    left:120%;
}

.card:hover {
    transform:scale(1.02);
    box-shadow:0 0 30px rgba(0,255,255,0.6);
}

/* VIDEO */
.video-wrapper {
    padding:0px;
    background:dark blue;
}

.video-wrapper video {
    width:100%;
    height:auto;
    max-height:260px;
    object-fit:contain;
    border-radius:10px;
}

/* CONTENT */
.content {
    padding:1px 15px 20px;
    text-align:center;
}

.content h3 {
    margin:10px 0 15px;
    font-size:16px;
}

/* BUTTON GROUP */
.btn-group {
    display:flex;
    justify-content:center;
    gap:10px;
}

/* BUTTON */
.btn {
    flex:1;
    max-width:140px;
    padding:10px 0;
    border-radius:30px;
    text-decoration:none;
    font-weight:bold;
    font-size:14px;
    text-align:center;
    color:white;
    background:linear-gradient(90deg,#0b00a3,#0090ff);
    box-shadow:0 0 10px #0090ff;
}

.btn.main {
    background:linear-gradient(90deg,#ff0000,#800000);
    box-shadow:0 0 10px #ff0000;
}

/* FOOTER */
.footer {
    text-align:center;
    padding:20px;
    opacity:0.6;
}

/* GRID */
@media (min-width: 900px) {
    #videos {
        display:grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap:20px;
        padding:20px 40px;
        max-width:1200px;
        margin:auto;
    }
    .card {
        margin:0;
    }
}
/* ================= POPUP ================= */
#popupClick {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:999;
}

.popup-box {
    background:#020617;
    padding:25px 35px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 20px #00ffff;
}

.popup-box i {
    font-size:28px;
    color:#00ffff;
    margin-bottom:10px;
    animation:spin 1s linear infinite;
}

@keyframes spin {
    from {transform:rotate(0);}
    to {transform:rotate(360deg);}
}
/* 🔥 POPUP ANIMATION */
#popupClick {
    opacity:0;
    transform:scale(0.8);
    transition:all 0.3s ease;
}

#popupClick.show {
    display:flex;
    opacity:1;
    transform:scale(1);
}

.popup-box {
    animation:popupIn 0.4s ease;
}

@keyframes popupIn {
    0% {
        transform:translateY(40px) scale(0.7);
        opacity:0;
    }
    100% {
        transform:translateY(0) scale(1);
        opacity:1;
    }
}
/* 🔥 ANIMASI TOMBOL HIDUP */
.btn {
    position:relative;
    overflow:hidden;
    animation:btnFloat 2.5s ease-in-out infinite, btnGlow 2s infinite;
}

/* 🔥 FLOAT NAIK TURUN HALUS */
@keyframes btnFloat {
    0% {transform:translateY(0);}
    50% {transform:translateY(-4px);}
    100% {transform:translateY(0);}
}

/* 🔥 GLOW HIDUP */
@keyframes btnGlow {
    0% {box-shadow:0 0 8px rgba(255 255 255 / 50%);}
    50% {box-shadow:0 0 18px rgba(0 144 255);}
    100% {box-shadow:0 0 8px rgba(255 255 255 / 50%);}
}

/* 🔥 KHUSUS TOMBOL MAIN (ORANGE) */
.btn.main {
    animation:btnFloat 2.5s ease-in-out infinite, btnGlowMain 2s infinite;
}

@keyframes btnGlowMain {
    0% {box-shadow:0 0 8px rgba(255 255 255 / 50%);}
    50% {box-shadow:0 0 18px rgba(255 0 0);}
    100% {box-shadow:0 0 8px rgba(255 255 255 / 50%);}
}
.btn::after {
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:50%;
    height:100%;
    background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.4),
        transparent
    );
    transform:skewX(-20deg);
    animation:shine 3s infinite;
}

@keyframes shine {
    0% {left:-100%;}
    100% {left:150%;}
}
/* 🔥 COVER HALUS TANPA ZOOM */
.cover {
    position:relative;
    height:280px;
    overflow:hidden;
    transition:height 0.5s ease, background 0.5s ease;
}

/* overlay cinematic */
.cover::before {
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(to bottom, rgba(0 0 0 / 0%), rgba(0,0,0,0.9));
    z-index:1;
    transition:0.5s ease;
}

/* 🔥 PROFILE GAYA FACEBOOK */
.profile {
    position:absolute;
    left:1px;
    bottom:1px;
    display:flex;
    align-items:center; /* 🔥 WAJIB */
    gap:1px;
    z-index:5;
}

/* FOTO */
.profile img {
    width:90px;
    height:90px;
    border-radius:50%;
    border:4px solid #020617; /* tetap ada garis */
    box-shadow:0 0 10px rgba(0,0,0,0.5);
    background:#000;
    flex-shrink:0; /* 🔥 penting biar gak gepeng / ketekan */
}

/* TEXT */
.brand {
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
}

/* NAMA */
.brand h2 {
    font-size:18px;
    margin:0;
}

/* USERNAME */
.brand p {
    font-size:12px;
    opacity:0.7;
    margin:2px 0 6px;
}

/* SOSMED */
.socials {
    display:flex;
    gap:8px;
}

.profile img {
    width:90px;
    height:90px;
    border-radius:50%;
}

/* 🔥 BRAND FIX (BIAR GA TURUN) */
.brand {
    display:flex;
    flex-direction:column;
    justify-content:center;
    margin:0;
    margin-right:10px;
}

.brand h2 {
    margin:0;
    font-size:18px;
    line-height:1.2;
}

.brand p {
    margin:2px 0;
    font-size:12px;
    opacity:0.7;
}

/* 🔥 SOSMED FIX (SEJAJAR SAMPING) */
.socials {
    display:flex;
    align-items:center;
    gap:8px;
    margin-left:30px;
    flex-shrink:0; /* 🔥 tambahan biar gak jatuh */
}

.socials a {
    width:35px;
    height:35px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:50%;
    color:white;
    font-size:16px;
    transition:0.3s;
}

.socials a:nth-child(1){background:#E1306C;} /* IG */
.socials a:nth-child(2){background:#25D366;} /* WA */
.socials a:nth-child(3){background:#1877F2;} /* FB */

.socials a:hover {
    transform:translateY(-3px);
}

/* 🔥 SCROLL HALUS (NO ZOOM) */
.cover.scrolled {
    height:120px;
}

.cover.scrolled .profile {
    bottom:10px;
}

/* 🔥 PC RAPIH */
@media (min-width:900px){
    .cover {
        max-width:1200px;
        margin:auto;
        border-radius:15px;
    }
}
.cover {
    width:100%;
}
.video-wrapper {
    position:relative;
    cursor:pointer;
}

/* sembunyikan control awal */
.video-wrapper video {
    pointer-events:auto;
}

/* tombol play tengah */
.play-btn {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    font-size:50px;
    color:white;
    background:rgba(0,0,0,0.5);
    width:70px;
    height:70px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:5;
}

/* saat aktif (sudah diklik) */
.video-wrapper.active video {
    pointer-events:auto;
}

.video-wrapper.active .play-btn {
    display:none;
}
video::-webkit-media-controls-overlay-play-button {
    display:none !important;
}
body::after {
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    z-index:-1;
}
</style>
</head>

<body>

<div class="cover" id="coverImg">
    <div class="profile">
    <img id="profileImg" src="">

    <div class="brand">
        <h2 id="nama"></h2>
        <p>Situs Slot Gacor Indonesia</p>
    </div>

    <div class="socials">
        <a href="#" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="#" target="_blank"><i class="fab fa-whatsapp"></i></a>
        <a href="#" target="_blank"><i class="fab fa-facebook-f"></i></a>
    </div>
</div>
</div>

<div class="space"></div>

<!-- BANNER LAMA (MOBILE) -->
<a href="https://link-kamu.com" target="_blank">
    <div class="banner">
        <img id="bannerImg" src="">
    </div>
</a>

<!-- BANNER BARU (PC) -->
<div class="banner-wrap">
    <a href="https://link-kamu.com" target="_blank" class="banner-left">
        <img id="bannerLeft" src="">
    </a>

    <a href="https://link-kamu.com" target="_blank" class="banner-right">
        <img id="bannerRight" src="">
    </a>
</div>

<div id="videos"></div>

<div class="footer">© 2026 Benihtoto</div>

<script>
document.getElementById("profileImg").src = "https://www.image2url.com/r2/default/images/1777487535480-838e3e40-b748-43a6-9e85-1ff7db057f2e.jpeg";
document.getElementById("nama").innerText = "BENIHTOTO";

document.getElementById("coverImg").style.backgroundImage =
"url('https://www.image2url.com/r2/default/images/1777488172377-df5d26bb-a0ca-4795-8c71-8ee6ba678cd6.jpeg')";

document.getElementById("bannerImg").src =
"https://www.image2url.com/r2/default/gifs/1777156857009-31dbbb6d-9e0b-45d8-9956-f7efba63f31e.gif";

/* 🔥 BANNER PC */
document.getElementById("bannerLeft").src =
"https://imgme.pro/images/banner.gif";

document.getElementById("bannerRight").src =
"https://imgme.pro/images/banner.gif";

/* VIDEO */
const dataVideo = [
{
    title: "⚡JP GATES OLYMPUS 1000 (12 JUTA)⚡",
    link: "https://videotourl.com/videos/1777572918439-3ef238a8-f3be-4941-b76d-73581c7f73a6.mp4",
    daftar: "https://userid.vip/fbads7",
    main: "https://userid.vip/fbads7"
},
{
    title: "⚡JP BONANZA GOLD (108 JUTA)⚡",
    link: "https://videotourl.com/videos/1777573366336-56f4bab5-8121-4750-a85b-5fc4cf64239a.mp4",
    daftar: "https://userid.vip/fbads7",
    main: "https://userid.vip/fbads7"
},
{
    title: "⚡JP MERMAID'S TREASURE (11 JUTA)⚡",
    link: "https://videotourl.com/videos/1777580680910-30815dcc-6b00-419a-8515-2f377c715cfa.mp4",
    daftar: "https://userid.vip/fbads7",
    main: "https://userid.vip/fbads7"
},
{
    title: "⚡JP MAHJONG WINS 3 (21 JUTA)⚡",
    link: "https://videotourl.com/videos/1777580777811-0d13949f-8bc0-417d-ac65-51c577a1c0a5.mp4",
    daftar: "https://userid.vip/fbads7",
    main: "https://userid.vip/fbads7"
},
{
    title: "BELUM JADI",
    link: "KOSONG BELUM JADI",
    daftar: "https://userid.vip/fbads7",
    main: "https://userid.vip/fbads7"
},
{
    title: "BELUM JADI",
    link: "KOSONG BELUM JADI",
    daftar: "https://userid.vip/fbads7",
    main: "https://userid.vip/fbads7"
}
];

const container = document.getElementById("videos");

dataVideo.forEach(v => {
    container.innerHTML += `
<div class="card">

    <!-- 🔥 BADGE TOP -->
    <div class="badge-top">
        <img src="https://www.image2url.com/r2/default/gifs/1777243121692-eaec433e-4dd6-4fd8-8781-85ba49d15103.gif">
    </div>

    <div class="video-wrapper">
    <div class="play-btn"><i class="fas fa-play"></i></div>
    <video controls src="${v.link}"></video>
</div>
        <div class="content">
            <h3>${v.title}</h3>
            <div class="btn-group">
                <a href="${v.daftar}" target="_blank" class="btn">
    <i class="fas fa-user-plus"></i> DAFTAR
</a>
                <a href="${v.main}" target="_blank" class="btn main">
    <i class="fas fa-right-to-bracket"></i> MAIN
</a>
            </div>
        </div>
    </div>
    `;
});
// 🔥 AUTO STOP + NEON AKTIF
document.addEventListener("play", function(e) {

    document.querySelectorAll("video").forEach(v => {
        if (v !== e.target) {
            v.pause();
            v.parentElement.classList.remove("active");
        }
    });

    // aktifkan neon di video yang play
    e.target.parentElement.classList.add("active");

}, true);
// 🔥 POPUP CLICK EFFECT
document.addEventListener("click", function(e) {

    const btn = e.target.closest(".btn");
    if (!btn) return;

    e.preventDefault(); // stop langsung pindah

    const link = btn.getAttribute("href");
    const popup = document.getElementById("popupClick");

    popup.style.display = "flex";

    // kasih class animasi
    setTimeout(() => {
        popup.classList.add("show");
    }, 10);

    // delay sebelum pindah
    setTimeout(() => {
        window.open(link, "_blank");

        // reset popup
        popup.classList.remove("show");

        setTimeout(() => {
            popup.style.display = "none";
        }, 300);

    }, 800);
});
// 🔥 custom play (klik wrapper)
document.addEventListener("click", function(e){

    const wrapper = e.target.closest(".video-wrapper");
    if(!wrapper) return;

    const video = wrapper.querySelector("video");

    // pause video lain
    document.querySelectorAll("video").forEach(v => {
        if(v !== video){
            v.pause();
            v.parentElement.classList.remove("active");
        }
    });

    // aktifkan video ini
    wrapper.classList.add("active");

// 🔥 sembunyikan tombol play dulu (fix double)
const btn = wrapper.querySelector(".play-btn");
if (btn) btn.style.display = "none";

// baru aktifkan video
video.play();

});
// reset play button saat video pause
document.addEventListener("pause", function(e){
    const wrapper = e.target.parentElement;
    const btn = wrapper.querySelector(".play-btn");

    if(btn){
        btn.style.display = "flex";
    }
}, true);
document.querySelectorAll("video").forEach(v => {
    v.setAttribute("controls", "controls");
});
</script>
<div id="popupClick">
    <div class="popup-box">
        <i class="fas fa-bolt"></i>
        <p>Loading...</p>
    </div>
</div>
</body>
</html>
