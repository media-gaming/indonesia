







<!DOCTYPE html>
<html lang="id">
<head>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gameplay Benihtoto</title>
<link rel="apple-touch-icon" href="https://www.image2url.com/r2/default/images/1777404849718-650dba46-433c-433b-9e68-4d6f5d3ba493.png">

<style>
/* 🔥 BADGE TOP HIJAU SIMPLE */
.badge-top {
    position:absolute;
    top:0px;
    left:0px;
    display:flex;
    align-items:center;
    gap:8px;
    border-radius:25px;
    z-index:5;
}

.badge-top img {
    width:40px;
    height:40px;
    object-fit:cover;
}

.badge-top span {
    font-size:15px;
    font-weight:bold;
    color:#00ff4c;
}
body {
    font-family:Arial;
    background: radial-gradient(circle at center, #0061aa 0%, #001f3f 100%);
    color:white;
    overflow-x:hidden;
}

/* BACKGROUND */
body::before {
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:radial-gradient(circle, rgba(0,255,255,0.15) 1px, transparent 1px);
    background-size:40px 40px;
    animation:moveBg 10s linear infinite;
    z-index:-1;
}

@keyframes moveBg {
    from {transform:translateY(0);}
    to {transform:translateY(40px);}
}

/* COVER */
.cover {
    position:relative;
    height:280px;
    background-size:100% auto; /* 🔥 ini kuncinya */
    background-position:center;
    background-repeat:no-repeat;
    overflow:hidden;
    transition:height 0.5s ease;
}

/* EFEK GELAP */
.cover::after {
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0.3));
}

/* PROFILE */
.profile {
    position:absolute;
    bottom:-40px;
    left:20px;
    display:flex;
    align-items:center;
    z-index:2;
}

.profile img {
    width:80px;
    height:80px;
    border-radius:50%;
    border:3px solid #00ffff;
    box-shadow:0 0 15px #00ffff;
}

.profile h2 {
    margin-left:10px;
    text-shadow:0 0 10px #00ffff;
}

.space { height:50px; }

/* BANNER LAMA */
.banner {
    margin:15px;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 0 25px #00ffff;
    animation:pulse 2s infinite;
    height:60px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.banner img {
    height:60px;
    width:auto;
}

/* 🔥 BANNER BARU (PC ONLY) */
.banner-wrap {
    display:none;
}

@media (min-width: 900px) {

    .banner {
        display:none;
    }

    .banner-wrap {
        display:flex;
        justify-content:space-between;
        align-items:center;
        max-width:1200px;
        margin:25px auto;
        padding:0 40px;
    }

    .banner-left,
    .banner-right {
        width:512px;
        height:60px;
        border-radius:12px;
        overflow:hidden;
        box-shadow:0 0 25px #00ffff;
        animation:pulse 2s infinite;
    }

    .banner-left img,
    .banner-right img {
        width:100%;
        height:100%;
        object-fit:cover;
        display:block;
    }
}

/* FIX HP */
@media (max-width:600px) {
    .banner {
        height:auto;
    }
    .banner img {
        width:100%;
        height:auto;
    }
}

@keyframes pulse {
    0% {box-shadow:0 0 10px #00ffff;}
    50% {box-shadow:0 0 30px #00ffff;}
    100% {box-shadow:0 0 10px #00ffff;}
}

/* CARD */
.card {
    background: linear-gradient(145deg,#0f172a,#1e293b);
    border-radius:15px;
    margin:20px 15px;
    overflow:hidden;
    position:relative;
    box-shadow:0 0 15px rgba(0,255,255,0.2);
    transition:0.3s;
}
/* 🔥 NEON GESER (SHINE EFFECT) */
.card::before {
    content:"";
    position:absolute;
    top:0;
    left:-120%;
    width:80%;
    height:100%;
    background:linear-gradient(
        120deg,
        transparent,
        rgba(0,255,255,0.5),
        transparent
    );
    transform:skewX(-20deg);
    transition:0.7s;
    pointer-events:none;
}

/* 🔥 AKTIF SAAT HOVER (PC) */
.card:hover::before {
    left:120%;
}

.card:hover {
    transform:scale(1.02);
    box-shadow:0 0 30px rgba(0,255,255,0.6);
}

/* VIDEO */
.video-wrapper {
    padding:2px;
    background:dark blue;
}

.video-wrapper video {
    width:100%;
    height:auto;
    max-height:260px;
    object-fit:contain;
    border-radius:10px;
}

/* CONTENT */
.content {
    padding:1px 15px 20px;
    text-align:center;
}

.content h3 {
    margin:10px 0 15px;
    font-size:16px;
}

/* BUTTON GROUP */
.btn-group {
    display:flex;
    justify-content:center;
    gap:10px;
}

/* BUTTON */
.btn {
    flex:1;
    max-width:140px;
    padding:10px 0;
    border-radius:30px;
    text-decoration:none;
    font-weight:bold;
    font-size:14px;
    text-align:center;
    color:white;
    background:linear-gradient(90deg,#0b00a3,#0090ff);
    box-shadow:0 0 10px #0090ff;
}

.btn.main {
    background:linear-gradient(90deg,#ff0000,#800000);
    box-shadow:0 0 10px #ff0000;
}

/* FOOTER */
.footer {
    text-align:center;
    padding:20px;
    opacity:0.6;
}

/* GRID */
@media (min-width: 900px) {
    #videos {
        display:grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap:20px;
        padding:20px 40px;
        max-width:1200px;
        margin:auto;
    }
    .card {
        margin:0;
    }
}
/* ================= POPUP ================= */
#popupClick {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:999;
}

.popup-box {
    background:#020617;
    padding:25px 35px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 20px #00ffff;
}

.popup-box i {
    font-size:28px;
    color:#00ffff;
    margin-bottom:10px;
    animation:spin 1s linear infinite;
}

@keyframes spin {
    from {transform:rotate(0);}
    to {transform:rotate(360deg);}
}
/* 🔥 POPUP ANIMATION */
#popupClick {
    opacity:0;
    transform:scale(0.8);
    transition:all 0.3s ease;
}

#popupClick.show {
    display:flex;
    opacity:1;
    transform:scale(1);
}

.popup-box {
    animation:popupIn 0.4s ease;
}

@keyframes popupIn {
    0% {
        transform:translateY(40px) scale(0.7);
        opacity:0;
    }
    100% {
        transform:translateY(0) scale(1);
        opacity:1;
    }
}
/* 🔥 ANIMASI TOMBOL HIDUP */
.btn {
    position:relative;
    overflow:hidden;
    animation:btnFloat 2.5s ease-in-out infinite, btnGlow 2s infinite;
}

/* 🔥 FLOAT NAIK TURUN HALUS */
@keyframes btnFloat {
    0% {transform:translateY(0);}
    50% {transform:translateY(-4px);}
    100% {transform:translateY(0);}
}

/* 🔥 GLOW HIDUP */
@keyframes btnGlow {
    0% {box-shadow:0 0 8px rgba(255 255 255 / 50%);}
    50% {box-shadow:0 0 18px rgba(0 144 255);}
    100% {box-shadow:0 0 8px rgba(255 255 255 / 50%);}
}

/* 🔥 KHUSUS TOMBOL MAIN (ORANGE) */
.btn.main {
    animation:btnFloat 2.5s ease-in-out infinite, btnGlowMain 2s infinite;
}

@keyframes btnGlowMain {
    0% {box-shadow:0 0 8px rgba(255 255 255 / 50%);}
    50% {box-shadow:0 0 18px rgba(255 0 0);}
    100% {box-shadow:0 0 8px rgba(255 255 255 / 50%);}
}
.btn::after {
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:50%;
    height:100%;
    background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.4),
        transparent
    );
    transform:skewX(-20deg);
    animation:shine 3s infinite;
}

@keyframes shine {
    0% {left:-100%;}
    100% {left:150%;}
}
/* ❄️ SALJU + ANGIN */
.snow {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:-1;
}

.snow span {
    position:absolute;
    top:-10px;
    color:white;
    font-size:14px;
    opacity:0.8;
    animation:saljuAngin linear infinite;
}

/* ❄️ GERAK JATUH + GOYANG */
@keyframes saljuAngin {
    0% {
        transform:translate(0, 0);
        opacity:0;
    }
    10% {
        opacity:1;
    }
    25% {
        transform:translate(-10px, 25vh);
    }
    50% {
        transform:translate(10px, 50vh);
    }
    75% {
        transform:translate(-15px, 75vh);
    }
    100% {
        transform:translate(10px, 110vh);
        opacity:0;
    }
}
/* 🔥 COVER HALUS TANPA ZOOM */
.cover {
    position:relative;
    height:280px;
    overflow:hidden;
    transition:height 0.5s ease, background 0.5s ease;
}

/* overlay cinematic */
.cover::before {
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,0.9));
    z-index:1;
    transition:0.5s ease;
}

/* PROFILE CENTER */
.profile {
    position:absolute;
    left:50%;
    bottom:20px;
    transform:translateX(-50%);
    flex-direction:column;
    text-align:center;
    z-index:2;
    transition:0.5s ease;
}

.profile img {
    width:90px;
    height:90px;
    border-radius:50%;
}

/* 🔥 BRAND TEXT */
.brand {
    margin-top:10px;
}

.brand h2 {
    margin:5px 0;
    font-size:20px;
}

.brand p {
    font-size:12px;
    opacity:0.7;
}

/* 🔥 SOSMED */
.socials {
    margin-top:10px;
    display:flex;
    justify-content:center;
    gap:10px;
}

.socials a {
    width:35px;
    height:35px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:50%;
    color:white;
    font-size:16px;
    transition:0.3s;
}

.socials a:nth-child(1){background:#E1306C;} /* IG */
.socials a:nth-child(2){background:#25D366;} /* WA */
.socials a:nth-child(3){background:#1877F2;} /* FB */

.socials a:hover {
    transform:translateY(-3px);
}

/* 🔥 SCROLL HALUS (NO ZOOM) */
.cover.scrolled {
    height:120px;
}

.cover.scrolled .profile {
    bottom:10px;
}

/* 🔥 MOBILE 1:1 */
@media (max-width:600px){
    .cover {
        height:100vw;
    }
}

/* 🔥 PC RAPIH */
@media (min-width:900px){
    .cover {
        max-width:1200px;
        margin:auto;
        border-radius:15px;
    }
}
</style>
</head>

<body>
<div class="snow">
<span style="left:20%; font-size:10px; animation-duration:7s;">❄</span>
<span style="left:50%; font-size:18px; animation-duration:15s;">❄</span>
<span style="left:70%; font-size:12px; animation-duration:9s;">❄</span>
    <span style="left:5%; animation-duration:8s;">❄</span>
    <span style="left:15%; animation-duration:10s;">❄</span>
    <span style="left:25%; animation-duration:12s;">❄</span>
    <span style="left:35%; animation-duration:9s;">❄</span>
    <span style="left:45%; animation-duration:11s;">❄</span>
    <span style="left:55%; animation-duration:13s;">❄</span>
    <span style="left:65%; animation-duration:10s;">❄</span>
    <span style="left:75%; animation-duration:14s;">❄</span>
    <span style="left:85%; animation-duration:9s;">❄</span>
    <span style="left:95%; animation-duration:12s;">❄</span>
</div>

<div class="cover" id="coverImg">
    <div class="profile">
    <img id="profileImg" src="">

    <div class="brand">
        <h2 id="nama"></h2>
        <p>@benihtoto</p>
    </div>

    <div class="socials">
        <a href="#" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="#" target="_blank"><i class="fab fa-whatsapp"></i></a>
        <a href="#" target="_blank"><i class="fab fa-facebook-f"></i></a>
    </div>
</div>
</div>

<div class="space"></div>

<!-- BANNER LAMA (MOBILE) -->
<a href="https://link-kamu.com" target="_blank">
    <div class="banner">
        <img id="bannerImg" src="">
    </div>
</a>

<!-- BANNER BARU (PC) -->
<div class="banner-wrap">
    <a href="https://link-kamu.com" target="_blank" class="banner-left">
        <img id="bannerLeft" src="">
    </a>

    <a href="https://link-kamu.com" target="_blank" class="banner-right">
        <img id="bannerRight" src="">
    </a>
</div>

<div id="videos"></div>

<div class="footer">© 2026 Benihtoto</div>

<script>
document.getElementById("profileImg").src = "https://www.image2url.com/r2/default/images/1777404849718-650dba46-433c-433b-9e68-4d6f5d3ba493.png";
document.getElementById("nama").innerText = "BENIHTOTO";

document.getElementById("coverImg").style.backgroundImage =
"url('https://i1.sndcdn.com/artworks-76HPDX1v2TxJg3Q0-lvwoBA-t240x240.jpg')";

document.getElementById("bannerImg").src =
"https://www.image2url.com/r2/default/gifs/1777156857009-31dbbb6d-9e0b-45d8-9956-f7efba63f31e.gif";

/* 🔥 BANNER PC */
document.getElementById("bannerLeft").src =
"https://imgme.pro/images/banner.gif";

document.getElementById("bannerRight").src =
"https://imgme.pro/images/banner.gif";

/* VIDEO */
const dataVideo = [
{
    title: "MAXWIN MAHJONG WINS 3 ⚡",
    link: "https://www.image2url.com/r2/default/videos/1777157679778-8516ecfb-70d3-493a-a344-a4a9c66a3da3.mp4",
    daftar: "https://userid.vip/fbads7",
    main: "https://userid.vip/fbads7"
},
{
    title: "MAXWIN MERMAID'S TREASURE ⚡",
    link: "https://www.image2url.com/r2/default/videos/1777211207532-e7ababc4-91e9-4bdd-9fb7-7c6092c21ee1.mp4",
    daftar: "https://userid.vip/fbads7",
    main: "https://userid.vip/fbads7"
},
{
    title: "BONANZA GOLD",
    link: "https://www.image2url.com/r2/default/videos/1777237466711-9399f81d-8249-4ef0-95b6-cc670b31b388.mp4",
    daftar: "https://userid.vip/fbads7",
    main: "https://userid.vip/fbads7"
},
{
    title: "BELUM JADI",
    link: "https://www.image2url.com/r2/default/videos/1777157679778-8516ecfb-70d3-493a-a344-a4a9c66a3da3.mp4",
    daftar: "https://userid.vip/fbads7",
    main: "https://userid.vip/fbads7"
},
{
    title: "BELUM JADI",
    link: "https://www.image2url.com/r2/default/videos/1777157679778-8516ecfb-70d3-493a-a344-a4a9c66a3da3.mp4",
    daftar: "https://userid.vip/fbads7",
    main: "https://userid.vip/fbads7"
},
{
    title: "BELUM JADI",
    link: "https://www.image2url.com/r2/default/videos/1777157679778-8516ecfb-70d3-493a-a344-a4a9c66a3da3.mp4",
    daftar: "https://userid.vip/fbads7",
    main: "https://userid.vip/fbads7"
}
];

const container = document.getElementById("videos");

dataVideo.forEach(v => {
    container.innerHTML += `
<div class="card">

    <!-- 🔥 BADGE TOP -->
    <div class="badge-top">
        <img src="https://www.image2url.com/r2/default/gifs/1777243121692-eaec433e-4dd6-4fd8-8781-85ba49d15103.gif">
    </div>

    <div class="video-wrapper">
        <video controls src="${v.link}"></video>
    </div>
        <div class="content">
            <h3>${v.title}</h3>
            <div class="btn-group">
                <a href="${v.daftar}" target="_blank" class="btn">
    <i class="fas fa-user-plus"></i> DAFTAR
</a>
                <a href="${v.main}" target="_blank" class="btn main">
    <i class="fas fa-right-to-bracket"></i> MAIN
</a>
            </div>
        </div>
    </div>
    `;
});
// 🔥 AUTO STOP + NEON AKTIF
document.addEventListener("play", function(e) {

    document.querySelectorAll("video").forEach(v => {
        if (v !== e.target) {
            v.pause();
            v.parentElement.classList.remove("active");
        }
    });

    // aktifkan neon di video yang play
    e.target.parentElement.classList.add("active");

}, true);
// 🔥 POPUP CLICK EFFECT
document.addEventListener("click", function(e) {

    const btn = e.target.closest(".btn");
    if (!btn) return;

    e.preventDefault(); // stop langsung pindah

    const link = btn.getAttribute("href");
    const popup = document.getElementById("popupClick");

    popup.style.display = "flex";

    // kasih class animasi
    setTimeout(() => {
        popup.classList.add("show");
    }, 10);

    // delay sebelum pindah
    setTimeout(() => {
        window.open(link, "_blank");

        // reset popup
        popup.classList.remove("show");

        setTimeout(() => {
            popup.style.display = "none";
        }, 300);

    }, 800);
});
/* 🔥 SCROLL HALUS */
const cover = document.getElementById("coverImg");

let lastScroll = 0;
let ticking = false;

window.addEventListener("scroll", function () {
    lastScroll = window.scrollY;

    if (!ticking) {
        window.requestAnimationFrame(function () {

            // batas scroll (biar smooth)
            let maxScroll = 150;
            let progress = Math.min(lastScroll / maxScroll, 1);

            // tinggi awal & akhir
            let startHeight = window.innerWidth <= 600 ? window.innerWidth : 280;
            let endHeight = 110;

            let newHeight = startHeight - (startHeight - endHeight) * progress;

            cover.style.height = newHeight + "px";

            ticking = false;
        });

        ticking = true;
    }
});
</script>
<div id="popupClick">
    <div class="popup-box">
        <i class="fas fa-bolt"></i>
        <p>Loading...</p>
    </div>
</div>
</body>
</html>
